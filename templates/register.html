{% extends "base.html" %}
{% block title %}Inscription - LearnTrack{% endblock %}
{% block content %}
<h2>Créer un compte</h2>
<form action="{{ url_for('register') }}" method="post">
    <label for="nom">Nom</label>
    <input type="text" id="nom" name="nom" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>
    
    <label for="mot_de_passe">Mot de passe</label>
    <input type="password" id="mot_de_passe" name="mot_de_passe" required minlength="6">
    
    <button type="submit">S'inscrire</button>
    <p style="text-align: center;"><small><a href="{{ url_for('login') }}">Déjà un compte ? Connectez-vous.</a></small></p>
</form>
{% endblock %}
